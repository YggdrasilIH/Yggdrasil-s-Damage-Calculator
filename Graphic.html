<!DOCTYPE html>
<html>
<head>
    <title>Curse of Decay: Full Restoration & HD Tracking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #0b0e14; --card: #1a1f2e; --accent: #38bdf8; --text: #cbd5e1; --border: #334155; }
        body { font-family: 'Consolas', monospace; background: var(--bg); color: var(--text); padding: 20px; font-size: 12px; }
        .grid { display: flex; flex-direction: row; gap: 12px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 6px; }
        .grid .hero-card-wrapper { flex: 0 0 260px; min-width: 220px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 4px; }
        .card h3 { margin: 0 0 8px 0; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom:4px; }
        
        /* Graphical Elements */
        #battle-arena {
            width: 100%;
            max-width: 860px;
            height: 250px;
            background: linear-gradient(to bottom, #000, #1a1a2e);
            border: 2px solid #444;
            border-radius: 8px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }
        #boss-hp-container {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 20px;
            background: #333;
            border: 1px solid #ff4444;
        }
        #boss-hp-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #990000);
            transition: width 0.3s ease;
        }

        input, select { background: #000; color: #fff; border: 1px solid var(--border); padding: 4px; width: 100%; margin: 4px 0; box-sizing:border-box; }
        button { padding: 15px; font-weight: bold; cursor: pointer; border: 1px solid var(--accent); background: transparent; color: var(--accent); margin-top: 10px; width: 100%; }
        button:hover { background: var(--accent); color: #000; }
        #output { background: #000; border: 1px solid var(--border); padding: 15px; height: 400px; overflow-y: auto; line-height: 1.5; margin-top: 20px; }
    </style>
</head>
<body>

<div style="max-width:860px; margin-bottom:12px;">
    <h1 style="color:var(--accent);">Star Expedition Simulator: Bosch Edition</h1>
</div>

<div id="battle-arena">
    <div id="boss-hp-container">
        <div id="boss-hp-bar"></div>
        <div id="hp-text" style="position:absolute; width:100%; text-align:center; top:0; font-weight:bold; color:white; font-size:10px;">BOSS HP: 100%</div>
    </div>
    <canvas id="visualizer" width="860" height="250"></canvas>
</div>

<div style="max-width:860px; display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
    <button onclick="startVisualBattle()">⚔️ START BATTLE</button>
    <button onclick="resetSim()">🔄 RESET</button>
</div>

<div id="output"></div>

<script>
