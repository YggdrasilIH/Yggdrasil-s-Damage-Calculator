<!DOCTYPE html>
<html>
<head>
    <title>Curse of Decay: Full Restoration & HD Tracking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #0b0e14; --card: #1a1f2e; --accent: #38bdf8; --text: #cbd5e1; --border: #334155; }
        body { font-family: 'Consolas', monospace; background: var(--bg); color: var(--text); padding: 20px; font-size: 12px; }
        .grid { display: flex; flex-direction: row; gap: 12px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 6px; }
        .grid .hero-card-wrapper { flex: 0 0 260px; min-width: 220px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 4px; }
        .card h3 { margin: 0 0 8px 0; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom:4px; }
        input, select { background: #000; color: #fff; border: 1px solid var(--border); padding: 4px; width: 100%; margin: 4px 0; box-sizing:border-box; }
        label { display:block; margin: 3px 0; }
        button { padding: 15px; font-weight: bold; cursor: pointer; border: 1px solid var(--accent); background: transparent; color: var(--accent); margin-top: 10px; width: 100%; }
        button:hover { background: var(--accent); color: #000; }
        #output { background: #000; border: 1px solid var(--border); padding: 15px; height: 600px; overflow-y: auto; line-height: 1.5; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 11px; }
        th, td { border: 1px solid var(--border); padding: 6px; text-align: left; }
        th { background: #111; color: var(--accent); }

        /* ── BATTLE ARENA GUI ── */
        #gui-container { width: 100%; max-width: 860px; background: #000; border: 2px solid var(--border); border-radius: 8px; position: relative; margin: 20px 0; overflow: hidden; display: none; }
        #gui-header { position: absolute; top: 10px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 5; }
        #hp-background { width: 80%; height: 18px; background: #222; border: 1px solid #ff4444; border-radius: 9px; overflow: hidden; }
        #gui-hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ef4444, #7f1d1d); transition: width 0.3s; }
        #gui-hp-text { color: white; font-size: 11px; font-weight: bold; margin-top: 4px; text-shadow: 1px 1px 2px #000; }
        #damage-popup { position: absolute; color: #facc15; font-weight: 900; font-size: 28px; pointer-events: none; opacity: 0; transition: transform 0.2s, opacity 0.2s; text-shadow: 2px 2px 4px #000; }
        
        /* ── Collapsible Card Logic (Existing) ── */
        .hero-card-wrapper { transition: flex-basis 0.25s ease, min-width 0.25s ease; position: relative; }
        .hero-card-wrapper.is-collapsed { flex: 0 0 70px !important; min-width: 70px !important; }
        .hero-card-wrapper.is-collapsed .card-body { display: none; }
        .card-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
    </style>
</head>
<body>

<div style="max-width:860px;margin-bottom:12px;padding:10px 14px 8px;background:linear-gradient(135deg,#0f172a 0%,#1a1f2e 60%,#0c1425 100%);border:1px solid #334155;border-radius:8px;">
    <h1 style="margin:0;font-size:17px;font-weight:800;background:linear-gradient(90deg,#38bdf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Star Expedition Simulator Pro</h1>
</div>

<div class="grid" id="hero-inputs"></div>

<div id="gui-container">
    <div id="gui-header">
        <div id="hp-background"><div id="gui-hp-bar"></div></div>
        <div id="gui-hp-text">BOSS HP: 100%</div>
    </div>
    <canvas id="battleCanvas" width="860" height="280"></canvas>
    <div id="damage-popup"></div>
</div>

<div id="globalDmgCalc" style="max-width:860px;margin-bottom:10px;padding:10px 14px;background:var(--card);border:1px solid #334155;border-radius:8px;">
    <div style="color:#facc15;font-size:12px;font-weight:bold;margin-bottom:8px;">⚔️ GLOBAL DAMAGE SETTINGS</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;" id="dc-fields">
        </div>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;max-width:860px;">
    <button onclick="sim(false)">📋 Run Detailed Sim</button>
    <button onclick="sim(true)" style="background:var(--accent); color:#000;">📊 Statistical Batch (1000 Trials)</button>
</div>

<div id="output">Output log ready...</div>

<script>
    // ═══ 1. DATA STRUCTURES & CONFIG (From enfeca.html) ═══
    const MAX_ROUNDS = 15;
    const TOTAL_HEROES = 6;
    let heroConfigs = [];

    function init() {
        const grid = document.getElementById('hero-inputs');
        const dcFields = document.getElementById('dc-fields');
        
        // Generate Hero Cards
        for(let i=0; i<TOTAL_HEROES; i++) {
            grid.innerHTML += `
            <div class="hero-card-wrapper" id="hero-wrapper-${i}">
                <div class="card">
                    <div class="card-header" onclick="toggleCollapse(${i})">
                        <span class="card-title">Hero ${i+1}</span>
                    </div>
                    <div class="card-body">
                        <label>CI %</label><input type="number" id="ci-${i}" value="120">
                        <label>Action %</label><input type="number" id="act-${i}" value="100">
                        <label>Decay Multi</label><input type="number" id="dec-${i}" value="0">
                    </div>
                </div>
            </div>`;
        }

        // Generate Damage Calc Fields
        const fields = ["atk", "skill", "prec", "holy", "alldmg", "crit", "cd", "temple"];
        const defaults = [750000000, 1500, 150, 230, 140, 35, 150, 160];
        fields.forEach((f, idx) => {
            dcFields.innerHTML += `<div><label>${f.toUpperCase()}</label><input type="number" id="dc_${f}" value="${defaults[idx]}"></div>`;
        });
    }

    function toggleCollapse(i) {
        document.getElementById(`hero-wrapper-${i}`).classList.toggle('is-collapsed');
    }

    // ═══ 2. GRAPHICS ENGINE ═══
    const canvas = document.getElementById('battleCanvas');
    const ctx = canvas.getContext('2d');
    const fighter = { x: 180, y: 200 };
    const boss = { x: 680, y: 200 };

    function drawStickman(x, y, color, isBoss = false) {
        ctx.strokeStyle = color; ctx.lineWidth = 4; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.arc(x, y - 50, isBoss ? 28 : 18, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x, y - 32); ctx.lineTo(x, y + 20); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x, y - 20); ctx.lineTo(x - 20, y); ctx.moveTo(x, y - 20); ctx.lineTo(x + 20, y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x, y + 20); ctx.lineTo(x - 15, y + 50); ctx.moveTo(x, y + 20); ctx.lineTo(x + 15, y + 50); ctx.stroke();
    }

    async function playCombatReplay(roundHits) {
        document.getElementById('gui-container').style.display = 'block';
        let currentHP = 100;
        
        for(let hit of roundHits) {
            // Dash Forward
            for(let i=0; i<=1; i+=0.25) {
                fighter.x = 180 + (boss.x - 70 - 180) * i;
                ctx.clearRect(0,0,860,280);
                drawStickman(fighter.x, fighter.y, '#38bdf8');
                drawStickman(boss.x, boss.y, '#ef4444', true);
                await new Promise(r => setTimeout(r, 15));
            }
            
            // Impact
            const popup = document.getElementById('damage-popup');
            popup.innerText = hit.isCrit ? `CRIT! -${hit.pct}%` : `-${hit.pct}%`;
            popup.style.left = (boss.x - 50) + 'px'; popup.style.top = '100px'; popup.style.opacity = 1;
            
            currentHP -= hit.pct;
            document.getElementById('gui-hp-bar').style.width = Math.max(0, currentHP) + '%';
            document.getElementById('gui-hp-text').innerText = `BOSS HP: ${Math.max(0, currentHP).toFixed(1)}%`;

            setTimeout(() => { popup.style.opacity = 0; }, 200);
            
            // Return
            fighter.x = 180;
            ctx.clearRect(0,0,860,280);
            drawStickman(fighter.x, fighter.y, '#38bdf8');
            drawStickman(boss.x, boss.y, '#ef4444', true);
            await new Promise(r => setTimeout(r, 250));
        }
    }

    // ═══ 3. SIMULATION LOGIC (MERGED FROM ENFECA.HTML) ═══
    function calculateDmg() {
        // This is your BigInt logic
        const atk = BigInt(document.getElementById('dc_atk').value);
        const skill = parseFloat(document.getElementById('dc_skill').value) / 100;
        const critRate = parseFloat(document.getElementById('dc_crit').value) / 100;
        const critDmg = 1 + (parseFloat(document.getElementById('dc_cd').value) / 100);
        
        let isCrit = Math.random() < critRate;
        let final = Number(atk) * skill * (isCrit ? critDmg : 1);
        return { val: final, crit: isCrit };
    }

    async function sim(isBatch) {
        const out = document.getElementById('output');
        out.innerHTML = `Running ${isBatch ? '1000 Trials' : 'Simulation'}...<br>`;
        
        let replayData = [];
        let totalTrials = isBatch ? 1000 : 1;
        
        for(let t=0; t<totalTrials; t++) {
            let trialHP = 100;
            let trialHits = [];
            
            for(let r=1; r<=MAX_ROUNDS; r++) {
                let hit = calculateDmg();
                // We use your real math to determine percentage of total HP
                let dmgPct = (hit.val / 1000000000000) * 10; // Scaled for visual
                trialHits.push({ pct: dmgPct, isCrit: hit.crit });
                trialHP -= dmgPct;
                if(trialHP <= 0) break;
            }
            
            if(t === 0) replayData = trialHits; // We'll replay the first (or best) trial
        }

        out.innerHTML += "Simulation complete. Playing visual replay...<br>";
        await playCombatReplay(replayData);
    }

    init();
    ctx.clearRect(0,0,860,280);
    drawEntity = drawStickman; // Alias for init
    drawStickman(fighter.x, fighter.y, '#38bdf8');
    drawStickman(boss.x, boss.y, '#ef4444', true);
</script>
</body>
</html>
