<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Expedition — Fight Replay</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #06080f;
    --card:    #0d1117;
    --border:  #1e2d3d;
    --accent:  #38bdf8;
    --gold:    #facc15;
    --red:     #ef4444;
    --green:   #4ade80;
    --purple:  #a78bfa;
    --pink:    #f0abfc;
    --text:    #cbd5e1;
    --muted:   #475569;
    --boss-hp: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated starfield background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 40% at 50% 0%, #0a1628 0%, transparent 70%),
      radial-gradient(ellipse 60% 60% at 20% 80%, #0a0a1a 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  #stars {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    overflow: hidden;
  }
  .star {
    position: absolute; border-radius: 50%;
    background: white;
    animation: twinkle var(--d, 3s) var(--delay, 0s) infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: var(--lo, 0.1); transform: scale(1); }
    to   { opacity: var(--hi, 0.6); transform: scale(1.3); }
  }

  /* ── Layout ── */
  #app {
    position: relative; z-index: 1;
    max-width: 920px; margin: 0 auto;
    padding: 20px 16px 80px;
  }

  /* ── Header ── */
  header {
    text-align: center; margin-bottom: 28px;
  }
  header h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(16px, 3.5vw, 26px);
    background: linear-gradient(135deg, #38bdf8, #a78bfa, #facc15);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.08em;
    text-shadow: none;
  }
  header p {
    font-size: 11px; color: var(--muted); margin-top: 4px;
  }

  /* ── Controls bar ── */
  #controls {
    display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 18px;
  }
  #controls button {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 6px 16px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  #controls button:hover:not(:disabled) {
    background: var(--accent); color: #000;
  }
  #controls button:disabled {
    opacity: 0.35; cursor: default;
  }
  #controls button.danger {
    border-color: var(--red); color: var(--red);
  }
  #controls button.danger:hover {
    background: var(--red); color: #fff;
  }
  .speed-group {
    display: flex; align-items: center; gap: 8px; margin-left: auto;
    flex-shrink: 0;
  }
  .speed-group label { font-size: 11px; color: var(--muted); }
  #speedSlider {
    -webkit-appearance: none;
    width: 100px; height: 4px;
    background: var(--border); border-radius: 2px; cursor: pointer;
  }
  #speedSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
  }
  #speedLabel { font-size: 11px; color: var(--accent); min-width: 40px; }

  /* ── Status bar ── */
  #statusBar {
    font-size: 11px; color: var(--muted);
    background: #0a0c12;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 10px;
    margin-bottom: 14px;
    min-height: 26px;
    transition: color 0.2s;
  }
  #statusBar.active { color: var(--accent); }
  #statusBar.done   { color: var(--green);  }
  #statusBar.error  { color: var(--red);    }

  /* ── Boss panel ── */
  #bossPanel {
    background: var(--card);
    border: 1px solid #3f1a1a;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 18px;
    position: relative;
    overflow: hidden;
  }
  #bossPanel::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, #1a060614 0%, transparent 70%);
    pointer-events: none;
  }
  .boss-row {
    display: flex; align-items: center; gap: 14px;
    position: relative; z-index: 1;
  }
  /* Stick figure SVG */
  #stickFigure {
    flex-shrink: 0;
    width: 56px; height: 72px;
    transition: transform 0.15s;
  }
  #stickFigure.shake {
    animation: bossShake 0.35s ease;
  }
  @keyframes bossShake {
    0%,100% { transform: translateX(0) rotate(0deg); }
    20%      { transform: translateX(-5px) rotate(-3deg); }
    40%      { transform: translateX(6px) rotate(3deg); }
    60%      { transform: translateX(-4px) rotate(-2deg); }
    80%      { transform: translateX(3px) rotate(1deg); }
  }
  #stickFigure.attack {
    animation: bossAttack 0.45s ease;
  }
  @keyframes bossAttack {
    0%   { transform: scale(1) translateX(0); }
    30%  { transform: scale(1.2) translateX(18px); }
    70%  { transform: scale(1.1) translateX(10px); }
    100% { transform: scale(1) translateX(0); }
  }
  .boss-info { flex: 1; }
  .boss-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 13px; color: var(--red);
    letter-spacing: 0.06em; margin-bottom: 6px;
  }
  .hp-bar-wrap {
    background: #1a0505; border-radius: 3px; height: 18px;
    border: 1px solid #3f1a1a; overflow: hidden; position: relative;
  }
  #bossHPBar {
    height: 100%; width: 100%;
    background: linear-gradient(90deg, #7f1d1d, #ef4444, #fca5a5);
    border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }
  #bossHPBar::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent 0px, transparent 8px,
      rgba(255,255,255,0.04) 8px, rgba(255,255,255,0.04) 10px
    );
  }
  .hp-label {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 4px; font-size: 10px;
  }
  #bossHPPct  { color: var(--red);   font-weight: bold; }
  #bossHPText { color: var(--muted); }
  .boss-stats {
    display: flex; gap: 16px; margin-top: 8px; flex-wrap: wrap;
    font-size: 10px; color: var(--muted);
  }
  .boss-stat { display: flex; align-items: center; gap: 4px; }
  .boss-stat span { color: var(--text); }

  /* ── Heroes row ── */
  #heroesRow {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-bottom: 18px;
    justify-content: center;
  }

  .hero-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 8px;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    width: 100px;
    position: relative;
    transition: border-color 0.2s, transform 0.1s, box-shadow 0.2s;
    overflow: visible;
  }
  .hero-card.active {
    border-color: var(--gold);
    box-shadow: 0 0 12px #facc1540;
    transform: translateY(-3px);
  }
  .hero-card.damaged {
    animation: heroHurt 0.4s ease;
  }
  @keyframes heroHurt {
    0%,100% { background: var(--card); }
    30%     { background: #1a0606; border-color: var(--red); }
  }
  .hero-card.attacking {
    animation: heroAttack 0.4s ease;
  }
  @keyframes heroAttack {
    0%,100% { transform: translateY(-3px) scale(1); }
    40%     { transform: translateY(-3px) translateX(12px) scale(1.08); }
    70%     { transform: translateY(-3px) translateX(6px) scale(1.04); }
  }
  .hero-icon-wrap {
    position: relative; width: 44px; height: 44px;
  }
  .hero-icon {
    width: 44px; height: 44px;
    object-fit: contain; border-radius: 6px;
    display: block;
  }
  .hero-icon-placeholder {
    width: 44px; height: 44px; border-radius: 6px;
    background: #1e293b;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--muted); font-weight: bold;
    text-align: center; line-height: 1.2;
  }
  .hero-name {
    font-size: 9px; color: var(--accent);
    font-weight: bold; letter-spacing: 0.05em;
    text-align: center;
  }

  /* HP bar per hero */
  .hero-hp-bar-wrap {
    width: 100%; height: 5px;
    background: #1a2030; border-radius: 2px; overflow: hidden;
  }
  .hero-hp-bar {
    height: 100%;
    background: linear-gradient(90deg, #22c55e, #4ade80);
    border-radius: 2px;
    transition: width 0.5s ease;
  }
  .hero-hp-bar.low  { background: #facc15; }
  .hero-hp-bar.crit { background: var(--red); }

  /* Energy bar */
  .hero-energy-wrap {
    width: 100%; height: 4px;
    background: #0a0c12; border-radius: 2px; overflow: hidden;
  }
  .hero-energy-bar {
    height: 100%;
    background: linear-gradient(90deg, #38bdf8, #7dd3fc);
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .hero-energy-bar.full { background: linear-gradient(90deg, #facc15, #fde68a); }

  .hero-status-row {
    display: flex; gap: 3px; flex-wrap: wrap; justify-content: center;
    min-height: 12px;
  }
  .status-chip {
    font-size: 7px; padding: 1px 4px; border-radius: 2px;
    font-weight: bold; letter-spacing: 0.04em;
  }
  .chip-active { background: #1a3a0a; color: #4ade80; border: 1px solid #22c55e44; }
  .chip-silence { background: #1a1a3a; color: #818cf8; border: 1px solid #6366f144; }
  .chip-fear    { background: #2a1a0a; color: #fb923c; border: 1px solid #f97316aa; }
  .chip-seal    { background: #2a1a1a; color: #fca5a5; border: 1px solid #ef444444; }
  .chip-dead    { background: #1a0a0a; color: #64748b; border: 1px solid #33415544; }

  /* Floating damage number */
  .float-dmg {
    position: absolute;
    top: -8px; left: 50%; transform: translateX(-50%);
    font-family: 'Cinzel Decorative', serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 8px #facc1580;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
    animation: floatUp 1.4s ease forwards;
  }
  .float-dmg.crit {
    color: #ff4757;
    font-size: 15px;
    text-shadow: 0 0 10px #ff475780;
  }
  .float-dmg.heal { color: var(--green); font-size: 11px; }
  .float-dmg.buff { color: var(--purple); font-size: 10px; }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateX(-50%) translateY(0px); }
    70%  { opacity: 0.9; transform: translateX(-50%) translateY(-32px); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-48px); }
  }

  /* Boss damage float (appears over boss area) */
  #bossDmgFloat {
    position: absolute;
    top: 10px; right: 16px;
    font-family: 'Cinzel Decorative', serif;
    font-size: 18px; font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 12px #facc15aa;
    pointer-events: none;
    opacity: 0;
    z-index: 50;
  }
  #bossDmgFloat.show {
    animation: bossDmgPop 1.6s ease forwards;
  }
  @keyframes bossDmgPop {
    0%   { opacity: 0; transform: scale(0.6) translateY(0); }
    15%  { opacity: 1; transform: scale(1.2) translateY(-8px); }
    50%  { opacity: 1; transform: scale(1.0) translateY(-20px); }
    100% { opacity: 0; transform: scale(0.8) translateY(-40px); }
  }

  /* ── Event log ── */
  #eventLog {
    background: #050709;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    height: 220px;
    overflow-y: auto;
    font-size: 11px;
    line-height: 1.7;
    scroll-behavior: smooth;
  }
  #eventLog::-webkit-scrollbar { width: 4px; }
  #eventLog::-webkit-scrollbar-track { background: transparent; }
  #eventLog::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-entry { padding: 0; }
  .log-round {
    color: #ff4757; font-weight: bold; margin-top: 8px;
    padding: 2px 0;
    border-bottom: 1px solid #1e0a0a;
  }
  .log-action { color: var(--gold); }
  .log-dmg    { color: var(--gold); }
  .log-boss   { color: #ff4757; }
  .log-buff   { color: var(--green); }
  .log-cc     { color: var(--red); }
  .log-info   { color: var(--muted); }
  .log-new { animation: flashEntry 0.5s ease; }
  @keyframes flashEntry {
    from { background: #facc1510; }
    to   { background: transparent; }
  }

  /* ── Round indicator ── */
  #roundIndicator {
    display: flex; gap: 6px; justify-content: center; align-items: center;
    margin-bottom: 14px; flex-wrap: wrap;
  }
  .round-pip {
    width: 28px; height: 6px; border-radius: 3px;
    background: var(--border);
    transition: background 0.3s, transform 0.2s;
  }
  .round-pip.done    { background: var(--muted); }
  .round-pip.current {
    background: var(--gold);
    transform: scaleY(2);
    box-shadow: 0 0 6px var(--gold);
  }
  .round-pip.kill    { background: var(--red); }

  /* ── Hidden iframe ── */
  #simFrame { display: none; }

  /* ── Loading overlay ── */
  #loadingOverlay {
    position: fixed; inset: 0; z-index: 200;
    background: #06080fee;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
  }
  #loadingOverlay p {
    color: var(--muted); font-size: 12px;
  }
  .loader-ring {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loadingOverlay.hidden { display: none; }

  /* progress bar for loading */
  #loadProgress {
    width: 200px; height: 3px;
    background: var(--border); border-radius: 2px; overflow: hidden;
  }
  #loadProgressBar {
    height: 100%; width: 0%;
    background: var(--accent); border-radius: 2px;
    transition: width 0.3s ease;
  }
</style>
</head>
<body>

<div id="stars"></div>

<div id="loadingOverlay">
  <div class="loader-ring"></div>
  <p id="loadingMsg">Loading simulator…</p>
  <div id="loadProgress"><div id="loadProgressBar"></div></div>
</div>

<iframe id="simFrame" src="enfeca.html"></iframe>

<div id="app">
  <header>
    <h1>⚔ Star Expedition — Fight Replay</h1>
    <p>Visual turn-by-turn replay powered by the live simulator</p>
  </header>

  <!-- Controls -->
  <div id="controls">
    <button id="btnRun">▶ Run Simulation</button>
    <button id="btnStep" disabled>⏭ Step</button>
    <button id="btnPlay" disabled>⏯ Play</button>
    <button id="btnReset" class="danger" disabled>↺ Reset</button>
    <div class="speed-group">
      <label>Speed</label>
      <input type="range" id="speedSlider" min="1" max="5" value="3">
      <span id="speedLabel">Normal</span>
    </div>
  </div>

  <!-- Status -->
  <div id="statusBar">Waiting for simulator to load…</div>

  <!-- Round indicator -->
  <div id="roundIndicator">
    <!-- filled by JS -->
  </div>

  <!-- Boss panel -->
  <div id="bossPanel">
    <span id="bossDmgFloat"></span>
    <div class="boss-row">
      <svg id="stickFigure" viewBox="0 0 56 72" xmlns="http://www.w3.org/2000/svg">
        <!-- glow bg -->
        <defs>
          <radialGradient id="auraGrad" cx="50%" cy="60%" r="50%">
            <stop offset="0%" stop-color="#ef444420"/>
            <stop offset="100%" stop-color="transparent"/>
          </radialGradient>
        </defs>
        <ellipse cx="28" cy="52" rx="20" ry="8" fill="url(#auraGrad)"/>
        <!-- body -->
        <circle cx="28" cy="14" r="9" stroke="#ef4444" stroke-width="2.5" fill="none"/>
        <!-- X eyes -->
        <line x1="23" y1="11" x2="26" y2="14" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="26" y1="11" x2="23" y2="14" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="30" y1="11" x2="33" y2="14" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="33" y1="11" x2="30" y2="14" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
        <!-- torso -->
        <line x1="28" y1="23" x2="28" y2="46" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
        <!-- arms -->
        <line x1="28" y1="28" x2="10" y2="22" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
        <line x1="28" y1="28" x2="46" y2="22" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
        <!-- legs -->
        <line x1="28" y1="46" x2="15" y2="63" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
        <line x1="28" y1="46" x2="41" y2="63" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
        <!-- weapon (sword) -->
        <line x1="46" y1="22" x2="54" y2="8" stroke="#facc15" stroke-width="2" stroke-linecap="round"/>
        <line x1="50" y1="17" x2="54" y2="13" stroke="#facc15" stroke-width="1.5" stroke-linecap="round"/>
      </svg>

      <div class="boss-info">
        <div class="boss-name">☠ Void Entity</div>
        <div class="hp-bar-wrap">
          <div id="bossHPBar" style="width:100%"></div>
        </div>
        <div class="hp-label">
          <span id="bossHPPct">100%</span>
          <span id="bossHPText">—</span>
        </div>
        <div class="boss-stats">
          <div class="boss-stat">Energy: <span id="bossEnergyStat">0</span></div>
          <div class="boss-stat">Round: <span id="roundStat">—</span></div>
          <div class="boss-stat">Actions: <span id="actionStat">—</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Heroes -->
  <div id="heroesRow"></div>

  <!-- Event log -->
  <div id="eventLog"><span style="color:#475569">Event log will appear here once the simulation runs.</span></div>
</div>

<script>
// ── Starfield ────────────────────────────────────────────────────────────────
(function() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%; top:${Math.random()*100}%;
      --d:${(Math.random()*4+2).toFixed(1)}s;
      --delay:${(Math.random()*5).toFixed(1)}s;
      --lo:${(Math.random()*0.15+0.05).toFixed(2)};
      --hi:${(Math.random()*0.5+0.3).toFixed(2)};
    `;
    container.appendChild(s);
  }
})();

// ── Speed mapping ──────────────────────────────────────────────────────────
const SPEED_MAP = {
  1: { label: 'Slowest', ms: 2800 },
  2: { label: 'Slow',    ms: 1600 },
  3: { label: 'Normal',  ms: 800  },
  4: { label: 'Fast',    ms: 350  },
  5: { label: 'Turbo',   ms: 80   },
};

const speedSlider = document.getElementById('speedSlider');
const speedLabel  = document.getElementById('speedLabel');
speedSlider.addEventListener('input', () => {
  speedLabel.textContent = SPEED_MAP[speedSlider.value].label;
});
speedLabel.textContent = SPEED_MAP[speedSlider.value].label;

function getDelay() { return SPEED_MAP[speedSlider.value].ms; }

// ── Iframe load & sim capture ─────────────────────────────────────────────
const iframe = document.getElementById('simFrame');
let simWin = null;
let simReady = false;

const loadingOverlay = document.getElementById('loadingOverlay');
const loadingMsg     = document.getElementById('loadingMsg');
const loadProgressBar= document.getElementById('loadProgressBar');
const statusBar      = document.getElementById('statusBar');

function setStatus(msg, type = '') {
  statusBar.textContent = msg;
  statusBar.className = type;
}

// Animate loading progress bar while iframe loads
let loadPct = 0;
const loadTicker = setInterval(() => {
  loadPct = Math.min(loadPct + (Math.random() * 8), 90);
  loadProgressBar.style.width = loadPct + '%';
}, 200);

iframe.addEventListener('load', () => {
  clearInterval(loadTicker);
  loadProgressBar.style.width = '100%';
  loadingMsg.textContent = 'Initializing…';

  // Give the simulator's window.onload a moment to run
  setTimeout(() => {
    simWin = iframe.contentWindow;
    loadingOverlay.classList.add('hidden');
    simReady = true;
    setStatus('Simulator ready. Press ▶ Run Simulation to begin.', 'done');
    document.getElementById('btnRun').disabled = false;

    // Build round pips
    buildRoundPips();
  }, 600);
});

iframe.addEventListener('error', () => {
  clearInterval(loadTicker);
  loadingOverlay.classList.add('hidden');
  setStatus('⚠ Could not load enfeca.html. Make sure this file is in the same folder.', 'error');
});

// ── Simulation capture ────────────────────────────────────────────────────
let capturedEvents = [];   // array of event objects
let heroIcons = {};        // name -> data URL
let bossMaxHP = 1;
let bossStartPct = 100;

/**
 * Parse the raw log messages into structured event objects.
 * Each event: { type, round, hero, text, damage, bossHPAfter, bossHPPct, heroHP, energy }
 */
function runAndCapture() {
  if (!simReady) return;

  capturedEvents = [];
  let currentRound = 0;
  let currentHero  = null;

  // Override log() in the iframe to capture all messages
  const origLog = simWin.log;
  const logLines = [];
  simWin.log = function(msg, color) {
    logLines.push({ msg: (msg||'').replace(/&nbsp;/g, ' ').replace(/<[^>]+>/g, ''), color: color || '#fff' });
    if (origLog) origLog.call(simWin, msg, color);
  };

  // Run the simulation (silent = true to avoid DOM thrashing)
  const origSilent = simWin.silent;
  simWin.silent = false; // we need log() to fire

  let result;
  try {
    result = simWin.runOne();
  } catch(e) {
    simWin.log = origLog;
    simWin.silent = origSilent;
    setStatus('⚠ Simulation error: ' + e.message, 'error');
    return null;
  }

  simWin.log = origLog;
  simWin.silent = origSilent;

  // Pull hero icons from the iframe
  heroIcons = simWin.HERO_ICONS || {};

  // Pull boss HP info
  bossMaxHP    = simWin.bossMaxHP    || 1;
  bossStartPct = simWin.bossCurrentHPPct || 100;
  const bossStartHP = bossMaxHP * (bossStartPct / 100);

  // ── Parse log lines into events ──────────────────────────────────────────
  let bossHP   = bossStartHP;
  let bossEnergy = 0;
  const heroHPs    = {};  // name -> 0-100
  const heroEnergy = {};  // name -> 0-200

  // Initialise from result.units
  if (result && result.units) {
    result.units.forEach(u => {
      heroHPs[u.name]    = 100;
      heroEnergy[u.name] = u.art === 'Demon Bell' || u.art === 'Spiritual Mirror' ? 100 : 50;
    });
  }

  // Helper: snapshot
  const snap = () => ({
    bossHP: bossHP,
    bossHPPct: bossMaxHP > 0 ? Math.max(0, (bossHP / bossMaxHP) * 100) : 0,
    bossEnergy: bossEnergy,
    heroHPs: { ...heroHPs },
    heroEnergy: { ...heroEnergy },
  });

  for (const line of logLines) {
    const t = line.msg.trim();
    if (!t) continue;

    // Round header
    const rMatch = t.match(/^ROUND (\d+)$/);
    if (rMatch) {
      currentRound = parseInt(rMatch[1]);
      capturedEvents.push({
        type: 'round', round: currentRound, text: `Round ${currentRound}`,
        ...snap()
      });
      continue;
    }

    // Hero turn start
    const heroTurn = t.match(/^--- (.+?) Moves \(Nrg: (\d+).*?\) ---/);
    if (heroTurn) {
      currentHero = heroTurn[1];
      const nrg = parseInt(heroTurn[2]);
      heroEnergy[currentHero] = nrg;
      capturedEvents.push({
        type: 'hero_turn', round: currentRound, hero: currentHero,
        text: `${currentHero} moves (Energy: ${nrg})`,
        ...snap()
      });
      continue;
    }

    // Damage dealt to boss — key line: "[DMG CALC TOTAL] X damage this active"
    const dmgTotal = t.match(/\[DMG CALC TOTAL\] ([\d,]+) damage this active/);
    if (dmgTotal) {
      const dmg = parseInt(dmgTotal[1].replace(/,/g, ''));
      bossHP = Math.max(0, bossHP - dmg);
      const isBossDead = t.includes('BOSS KILLED');
      capturedEvents.push({
        type: 'damage', round: currentRound, hero: currentHero,
        damage: dmg,
        text: `${currentHero} deals ${fmtDmg(dmg)} damage${isBossDead ? ' — BOSS KILLED!' : ''}`,
        killed: isBossDead,
        ...snap()
      });
      continue;
    }

    // Boss active: Catastrophic Roar
    if (t.includes('BOSS ACTIVE: CATASTROPHIC ROAR')) {
      bossEnergy = 0;
      capturedEvents.push({
        type: 'boss_active', round: currentRound,
        text: '☄ BOSS ACTIVE: Catastrophic Roar!',
        ...snap()
      });
      continue;
    }

    // Boss basic: Void Whip
    if (t.includes('BOSS BASIC: VOID WHIP')) {
      capturedEvents.push({
        type: 'boss_basic', round: currentRound,
        text: '🌑 BOSS BASIC: Void Whip',
        ...snap()
      });
      continue;
    }

    // Hero dodged
    const dodged = t.match(/💨 (.+?) DODGED/);
    if (dodged) {
      capturedEvents.push({
        type: 'dodge', round: currentRound, hero: dodged[1],
        text: `${dodged[1]} dodged!`,
        ...snap()
      });
      continue;
    }

    // Boss energy change
    const bossEnergyMatch = t.match(/\[BOSS ENERGY\].*→ (\d+)/);
    if (bossEnergyMatch) {
      bossEnergy = parseInt(bossEnergyMatch[1]);
      // don't push event — just update state
      continue;
    }

    // Hero CC
    const ccApplied = t.match(/\[CC APPLIED\] (.+?) is (SILENCE|FEAR|SEAL)ED/i);
    if (ccApplied) {
      capturedEvents.push({
        type: 'cc', round: currentRound, hero: ccApplied[1],
        cc: ccApplied[2].toLowerCase(),
        text: `${ccApplied[1]} is ${ccApplied[2]}!`,
        ...snap()
      });
      continue;
    }

    // Hero HP changes (from boss hits)
    const heroDodgedBoss = t.match(/(.+?) \+2 Calamity.*& \+2 Curse/);
    if (heroDodgedBoss) {
      // Hero was hit by boss active — visually reduce HP
      const h = heroDodgedBoss[1].trim();
      if (heroHPs[h] !== undefined) {
        heroHPs[h] = Math.max(0, heroHPs[h] - 15);
      }
      // already pushed by the boss active/basic event
      continue;
    }

    // Buff on hero
    const buffGiven = t.match(/\[BUFF\] (.+?) \+(\d+)% (\w+)/);
    if (buffGiven && parseInt(buffGiven[2]) >= 10) {
      capturedEvents.push({
        type: 'buff', round: currentRound, hero: buffGiven[1],
        text: `${buffGiven[1]} +${buffGiven[2]}% ${buffGiven[3]}`,
        ...snap()
      });
    }
  }

  // Final state
  bossHP = result ? result.bossEndHP : 0;
  capturedEvents.push({
    type: 'end', round: currentRound,
    text: result && result.bossEndHP <= 0
      ? '💀 BOSS DEFEATED!'
      : `⏹ Fight ended — Boss at ${((result.bossEndHP/bossMaxHP)*100).toFixed(1)}% HP`,
    ...snap(),
    bossHP: result ? result.bossEndHP : bossHP,
    bossHPPct: result ? Math.max(0, (result.bossEndHP / bossMaxHP) * 100) : 0,
  });

  return result;
}

// ── Number formatting ──────────────────────────────────────────────────────
function fmtDmg(n) {
  if (n >= 1e18) return (n / 1e18).toFixed(2) + 'E';
  if (n >= 1e15) return (n / 1e15).toFixed(2) + 'P';
  if (n >= 1e12) return (n / 1e12).toFixed(2) + 'T';
  if (n >= 1e9)  return (n / 1e9).toFixed(2)  + 'B';
  if (n >= 1e6)  return (n / 1e6).toFixed(2)  + 'M';
  if (n >= 1e3)  return (n / 1e3).toFixed(1)  + 'K';
  return String(Math.round(n));
}

function fmtSci(n) {
  if (n <= 0) return '0';
  const exp = Math.floor(Math.log10(n));
  const coef = (n / Math.pow(10, exp)).toFixed(3);
  return `${coef}×10^${exp}`;
}

// ── UI builders ───────────────────────────────────────────────────────────
let heroNames = [];

function buildRoundPips() {
  const wrap = document.getElementById('roundIndicator');
  wrap.innerHTML = '';
  for (let r = 1; r <= 15; r++) {
    const pip = document.createElement('div');
    pip.className = 'round-pip';
    pip.id = `pip-${r}`;
    pip.title = `Round ${r}`;
    wrap.appendChild(pip);
  }
}

function buildHeroCards(units) {
  heroNames = units.map(u => u.name);
  const row = document.getElementById('heroesRow');
  row.innerHTML = '';
  units.forEach(u => {
    const card = document.createElement('div');
    card.className = 'hero-card';
    card.id = `hcard-${u.name}`;

    const iconUrl = heroIcons[u.name];
    const iconHTML = iconUrl
      ? `<img class="hero-icon" src="${iconUrl}" alt="${u.name}">`
      : `<div class="hero-icon-placeholder">${u.name}</div>`;

    card.innerHTML = `
      <div class="hero-icon-wrap" id="hicon-${u.name}">${iconHTML}</div>
      <div class="hero-name">${u.name}</div>
      <div class="hero-hp-bar-wrap">
        <div class="hero-hp-bar" id="hpbar-${u.name}" style="width:100%"></div>
      </div>
      <div class="hero-energy-wrap">
        <div class="hero-energy-bar" id="enbar-${u.name}" style="width:${u.energy >= 100 ? 100 : u.energy}%"></div>
      </div>
      <div class="hero-status-row" id="hstatus-${u.name}"></div>
    `;
    row.appendChild(card);
  });
}

function updateHeroCard(name, hpPct, energy, ccState) {
  const hpBar = document.getElementById(`hpbar-${name}`);
  const enBar = document.getElementById(`enbar-${name}`);
  if (!hpBar || !enBar) return;

  const clampedHP = Math.max(0, Math.min(100, hpPct));
  hpBar.style.width = clampedHP + '%';
  hpBar.className = 'hero-hp-bar' +
    (clampedHP <= 20 ? ' crit' : clampedHP <= 50 ? ' low' : '');

  const clampedEn = Math.max(0, Math.min(100, energy));
  enBar.style.width = clampedEn + '%';
  enBar.className = 'hero-energy-bar' + (clampedEn >= 100 ? ' full' : '');

  const statusRow = document.getElementById(`hstatus-${name}`);
  if (statusRow) {
    let chips = '';
    if (ccState) {
      if (ccState.silence > 0) chips += `<span class="status-chip chip-silence">SIL</span>`;
      if (ccState.fear    > 0) chips += `<span class="status-chip chip-fear">FEAR</span>`;
      if (ccState.seal    > 0) chips += `<span class="status-chip chip-seal">SEAL</span>`;
    }
    if (clampedHP <= 0) chips = `<span class="status-chip chip-dead">KO</span>`;
    statusRow.innerHTML = chips;
  }
}

function updateBossHP(pct, hp, energy) {
  const clampedPct = Math.max(0, Math.min(100, pct));
  document.getElementById('bossHPBar').style.width = clampedPct + '%';
  document.getElementById('bossHPPct').textContent = clampedPct.toFixed(1) + '%';
  document.getElementById('bossHPText').textContent = fmtSci(hp) + ' HP';
  document.getElementById('bossEnergyStat').textContent = Math.round(energy || 0);
}

function setActiveHero(name) {
  document.querySelectorAll('.hero-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById(`hcard-${name}`);
  if (card) card.classList.add('active');
}

function clearActiveHero() {
  document.querySelectorAll('.hero-card').forEach(c => c.classList.remove('active'));
}

// Float a damage number over the boss panel
let bossDmgFloatTimeout = null;
function showBossDmgFloat(dmg) {
  const el = document.getElementById('bossDmgFloat');
  el.textContent = '-' + fmtDmg(dmg);
  el.className = 'show';
  clearTimeout(bossDmgFloatTimeout);
  bossDmgFloatTimeout = setTimeout(() => { el.className = ''; }, 1700);
}

// Float a small label over a hero card
function showHeroFloat(name, text, type = '') {
  const wrap = document.getElementById(`hicon-${name}`);
  if (!wrap) return;
  const f = document.createElement('div');
  f.className = 'float-dmg' + (type ? ' ' + type : '');
  f.textContent = text;
  wrap.style.position = 'relative';
  wrap.appendChild(f);
  setTimeout(() => f.remove(), 1500);
}

// Animate hero card
function animateHero(name, anim) {
  const card = document.getElementById(`hcard-${name}`);
  if (!card) return;
  card.classList.remove('attacking', 'damaged');
  void card.offsetWidth; // force reflow
  card.classList.add(anim);
  setTimeout(() => card.classList.remove(anim), 500);
}

// Animate boss
function animateBoss(anim) {
  const fig = document.getElementById('stickFigure');
  fig.classList.remove('shake', 'attack');
  void fig.offsetWidth;
  fig.classList.add(anim);
  setTimeout(() => fig.classList.remove(anim), 500);
}

// Log entry
const eventLog = document.getElementById('eventLog');
function addLog(text, type = 'info') {
  const el = document.createElement('div');
  el.className = `log-entry log-${type} log-new`;
  el.textContent = text;
  eventLog.appendChild(el);
  eventLog.scrollTop = eventLog.scrollHeight;
}

function clearLog() { eventLog.innerHTML = ''; }

// Update round pips
function updateRoundPip(r, state) {
  const pip = document.getElementById(`pip-${r}`);
  if (!pip) return;
  pip.className = 'round-pip ' + state;
}

// ── Replay engine ─────────────────────────────────────────────────────────
let frameIndex    = 0;
let playing       = false;
let playTimer     = null;
let replayResult  = null;
let roundsKilled  = new Set();

function applyEvent(evt) {
  // Update boss HP + energy from snapshot
  updateBossHP(evt.bossHPPct, evt.bossHP, evt.bossEnergy);

  // Update hero HPs + energies
  if (evt.heroHPs) {
    heroNames.forEach(name => {
      const hp = evt.heroHPs[name] ?? 100;
      const en = evt.heroEnergy ? (evt.heroEnergy[name] ?? 50) : 50;
      updateHeroCard(name, hp, en, null);
    });
  }

  // Specific visual per event type
  switch(evt.type) {
    case 'round':
      clearActiveHero();
      addLog(`━━━━━ ROUND ${evt.round} ━━━━━`, 'round');
      // Mark previous round pip done
      if (evt.round > 1) updateRoundPip(evt.round - 1, 'done');
      updateRoundPip(evt.round, 'current');
      document.getElementById('roundStat').textContent = evt.round;
      break;

    case 'hero_turn':
      setActiveHero(evt.hero);
      addLog(`► ${evt.text}`, 'action');
      document.getElementById('actionStat').textContent = evt.hero;
      break;

    case 'damage':
      animateHero(evt.hero, 'attacking');
      animateBoss('shake');
      showBossDmgFloat(evt.damage);
      addLog(`⚔ ${evt.text}`, 'dmg');
      if (evt.killed) {
        roundsKilled.add(evt.round);
        updateRoundPip(evt.round, 'kill');
        addLog('💀 BOSS DEFEATED!', 'dmg');
      }
      break;

    case 'boss_active':
      animateBoss('attack');
      heroNames.forEach(n => animateHero(n, 'damaged'));
      addLog(evt.text, 'boss');
      break;

    case 'boss_basic':
      animateBoss('attack');
      heroNames.forEach(n => animateHero(n, 'damaged'));
      addLog(evt.text, 'boss');
      break;

    case 'dodge':
      showHeroFloat(evt.hero, '💨 DODGE!', 'buff');
      addLog(`💨 ${evt.text}`, 'buff');
      break;

    case 'cc':
      showHeroFloat(evt.hero, evt.cc.toUpperCase(), 'crit');
      addLog(`⚡ ${evt.text}`, 'cc');
      break;

    case 'buff':
      showHeroFloat(evt.hero, '+', 'buff');
      // Only log notable buffs, not spam
      break;

    case 'end':
      clearActiveHero();
      // Mark last round
      updateRoundPip(evt.round, 'done');
      addLog(evt.text, evt.text.includes('DEFEATED') ? 'dmg' : 'info');
      setStatus(evt.text, evt.text.includes('DEFEATED') ? 'done' : 'active');
      break;
  }
}

function stepForward() {
  if (frameIndex >= capturedEvents.length) {
    pausePlay();
    setStatus('Replay complete!', 'done');
    document.getElementById('btnPlay').disabled = true;
    document.getElementById('btnStep').disabled = true;
    return;
  }
  const evt = capturedEvents[frameIndex++];
  applyEvent(evt);
}

function pausePlay() {
  playing = false;
  clearTimeout(playTimer);
  document.getElementById('btnPlay').textContent = '⏯ Play';
}

function startPlay() {
  playing = true;
  document.getElementById('btnPlay').textContent = '⏸ Pause';
  function tick() {
    if (!playing) return;
    if (frameIndex >= capturedEvents.length) {
      pausePlay();
      setStatus('Replay complete!', 'done');
      document.getElementById('btnPlay').disabled = true;
      document.getElementById('btnStep').disabled = true;
      return;
    }
    stepForward();
    playTimer = setTimeout(tick, getDelay());
  }
  tick();
}

function resetReplay() {
  pausePlay();
  frameIndex = 0;
  clearLog();
  // Reset boss
  updateBossHP(bossStartPct, simWin ? simWin.bossMaxHP * (bossStartPct / 100) : 0, 0);
  // Reset round pips
  for (let r = 1; r <= 15; r++) updateRoundPip(r, '');
  // Reset heroes
  if (replayResult && replayResult.units) {
    replayResult.units.forEach(u => updateHeroCard(u.name, 100, u.art === 'Demon Bell' || u.art === 'Spiritual Mirror' ? 100 : 50, null));
  }
  clearActiveHero();
  document.getElementById('roundStat').textContent = '—';
  document.getElementById('actionStat').textContent = '—';
  setStatus('Simulation captured. Press ▶ Play or ⏭ Step to replay.', 'done');
  document.getElementById('btnPlay').disabled = false;
  document.getElementById('btnStep').disabled = false;
  document.getElementById('btnPlay').textContent = '⏯ Play';
}

// ── Buttons ────────────────────────────────────────────────────────────────
document.getElementById('btnRun').addEventListener('click', () => {
  if (!simReady) return;
  setStatus('Running simulation…', 'active');
  clearLog();
  capturedEvents = [];
  frameIndex = 0;

  // Small delay to let status update render
  setTimeout(() => {
    replayResult = runAndCapture();
    if (!replayResult) return;

    // Build heroes
    buildHeroCards(replayResult.units);
    buildRoundPips();

    // Reset boss display
    bossStartPct = simWin.bossCurrentHPPct || 100;
    bossMaxHP    = simWin.bossMaxHP || 1;
    updateBossHP(bossStartPct, bossMaxHP * (bossStartPct / 100), 0);

    setStatus(`Captured ${capturedEvents.length} events. Press ▶ Play or ⏭ Step to replay.`, 'done');

    document.getElementById('btnPlay').disabled  = false;
    document.getElementById('btnStep').disabled  = false;
    document.getElementById('btnReset').disabled = false;
    document.getElementById('btnRun').textContent = '▶ Re-run';
  }, 60);
});

document.getElementById('btnPlay').addEventListener('click', () => {
  if (playing) pausePlay();
  else startPlay();
});

document.getElementById('btnStep').addEventListener('click', () => {
  if (playing) pausePlay();
  stepForward();
});

document.getElementById('btnReset').addEventListener('click', resetReplay);
</script>
</body>
